---
name: Reusable Docker Build & Push
on:
    workflow_call:
        inputs:
            image_name:
                required: true
                type: string
            tag:
                required: true
                type: string
        secrets:
          docker_username:
            required: true
          docker_token:
            required: true
        outputs:
            image_url:
                value: ${{ jobs.docker.outputs.image }}
jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
        image: ${{ steps.out.outputs.image }}
    steps:
        - name: Checkout Dockerfile
          uses: actions/checkout@v4

        - name: DockerHub login
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.docker_username }}
            password: ${{ secrets.docker_token }}

        - name: Docker Build image
          run: docker build -t ${{ inputs.image_name }}:${{ inputs.tag}} .

        - name: Docker Push to DockerHub
          run: docker push ${{ inputs.image_name }}:${{ inputs.tag}}

        - name: Set output
          id: out
          run: echo "image=${{ inputs.image_name }}:${{ inputs.tag}}" >> GITHUB_OUTPUT

