name: Main Pipeline

on:
  push:
    branches: [main]

jobs:
  # 1️⃣ Build & Test
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: 3.12

  # 2️⃣ Docker Build & Push
  docker:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: khirappawar1/capstone-app
      tag: latest
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # 3️⃣ Security Scan (Trivy)
  security-scan:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: khirappawar1/capstone-app:latest   # ✅ safer than relying on output
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
          output: 'trivy-report.txt'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

  # 4️⃣ Deploy
  deploy:
    needs: security-scan   # ✅ FIXED
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy
        run: |
          echo "Deploying image: khirappawar1/capstone-app:latest to production"